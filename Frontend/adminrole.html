<!doctype html>
<html>
  <head>
    <title>OrderFlow - Admin Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR (same style system as add product) -->
    <nav class="app-navbar">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="brand-logo">OrderFlow Admin</span>

        
    </nav>

    <div class="container dashboard-container">
      <!-- HEADER -->
      <div class="themed-card text-center" style="margin-bottom: 30px">
        <h2 style="color: #d91fae">Admin Dashboard</h2>
        <p style="color: #cfcfcf">Manage your system efficiently</p>
      </div>
  
      <!-- MENU GRID -->
      <div class="row g-4">
        <div class="col-md-6">
          <div class="themed-card text-center h-100">
            <h5 style="color:#ffb6cf">Add Product</h5>
            <p style="color: #ff80ab">Insert new items into the system</p>
            <button
              class="btn w-100"
              onclick="location.href = 'admin_add_product.html'"
            >
              Open
            </button>
          </div>
        </div>

        <div class="col-md-6">
          <div class="themed-card text-center h-100">
             <h5 style="color:#ffb6cf">Modify Product</h5>
            <p style="color: #ff80ab">Update existing products</p>
            <button
              class="btn w-100"
              onclick="location.href = 'admin_modify_product.html'"
            >
              Open
            </button>
          </div>
        </div>

        <div class="col-md-6">
          <div class="themed-card text-center h-100">
            <h5 style="color:#ffb6cf">Confirm Orders</h5>
            <p style="color: #ff80ab">Process customer orders</p>
            <button
              class="btn w-100"
              onclick="location.href = 'admin_confirm_order.html'"
            >
              Open
            </button>
          </div>
        </div>

      <div class="col-md-6">
          <div class="themed-card text-center h-100">
             <h5 style="color:#ffb6cf">Search </h5>
            <p style="color: #ff80ab">Search for a product</p>
            <button
              class="btn w-100"
              onclick="location.href = 'admin_search_for_product.html'"
            >
              Open
            </button>
          </div>
        </div>

        <div class="col-md-6">
          <div class="themed-card text-center h-100">
            <h5 style="color:#ffb6cf">Reports</h5>
            <p style="color: #ff80ab">View system analytics</p>
            <button
              class="btn w-100"
              onclick="location.href = 'admin_system_reports.html'"
            >
              Open
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
