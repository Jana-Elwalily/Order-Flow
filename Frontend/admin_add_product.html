<!doctype html>
<html>
  <head>
    <title>OrderFlow - Add Product</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR  -->
    <nav class="navbar">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="brand-logo">OrderFlow Admin</span>

        <div>
          <a href="adminrole.html" class="nav-link">Dashboard</a>
          <a href="admin_search_for_product.html" class="nav-link">Search</a>
          <a href="admin_confirm_order.html" class="nav-link">Orders</a>
          <a href="login.html" class="nav-link">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container dashboard-container">
      <!-- HEADER CARD -->
      <div class="themed-card text-center" style="margin-bottom: 30px">
        <h2 style="color: #ff80ab">Add New Product</h2>
        <p style="color: #cfcfcf">Insert a new product into the system</p>
      </div>

      <!-- MESSAGE -->
      <div id="message-container"></div>

      <!-- FORM CARD -->
      <div class="themed-card">
        <form id="AddProductForm">
          <label class="form-label">Product ID</label>
          <input
            type="text"
            id="product_id"
            name="product_id"
            class="form-control mb-3"
            required
          />

          <label class="form-label">Product Name</label>
          <input
            type="text"
            id="product_name"
            name="product_name"
            class="form-control mb-3"
            required
          />

          <label class="form-label">Seller</label>
          <select
            id="seller_id"
            name="seller_id"
            class="form-control mb-3"
            required
          >
            <option value="">Choose Seller</option>
          </select>

          <label class="form-label">Price</label>
          <input
            type="number"
            id="price"
            name="price"
            class="form-control mb-3"
            step="0.01"
            required
          />

          <label class="form-label">Category</label>
          <select
            id="category"
            name="category"
            class="form-control mb-3"
            required
          >
            <option value="Beauty">Beauty</option>
            <option value="Fashion">Fashion</option>
            <option value="Electronics">Electronics</option>
            <option value="Home&Applicances">Home&Applicances</option>
            <option value="Supermarket">Supermarket</option>
          </select>

          <label class="form-label">Stock</label>
          <input
            type="number"
            id="stock"
            name="stock"
            class="form-control mb-3"
            value="0"
            required
          />

          <label class="form-label">Threshold</label>
          <input
            type="number"
            id="threshold"
            name="threshold"
            class="form-control mb-4"
            value="5"
            required
          />

          <button type="submit" class="btn w-100">Add Product</button>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById("AddProductForm");
      const messageContainer = document.getElementById("message-container");
      const sellerSelect = document.getElementById("seller_id");

      // LOAD SELLERS
      function loadSellers() {
        fetch("../admin/process_files/process_get_sellers.php")
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              sellerSelect.innerHTML =
                '<option value="">Choose Seller</option>';
              data.sellers.forEach((s) => {
                let option = document.createElement("option");
                option.value = s.seller_id;
                option.textContent = s.name;
                sellerSelect.appendChild(option);
              });
            }
          })
          .catch(() => {
            sellerSelect.innerHTML = "<option>Error loading sellers</option>";
          });
      }

      loadSellers();

      // SUBMIT
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const stock = +document.getElementById("stock").value;
        const threshold = +document.getElementById("threshold").value;

        if (stock < threshold) {
          if (!confirm("Stock below threshold. Continue?")) return;
        }

        messageContainer.innerHTML = "Processing...";

        fetch("../admin/process_files/process_add_product.php", {
          method: "POST",
          body: new FormData(form),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              messageContainer.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
              form.reset();
              loadSellers();
            } else {
              messageContainer.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
            }
          })
          .catch(() => {
            messageContainer.innerHTML = `<div class="alert alert-danger">Server error</div>`;
          });
      });
    </script>
  </body>
</html>
